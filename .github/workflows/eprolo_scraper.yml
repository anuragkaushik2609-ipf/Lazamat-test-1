name: Eprolo Scraper

on:
  schedule:
    # Har 6 ghante — IST 6am, 12pm, 6pm, 12am
    # UTC: 0:30, 6:30, 12:30, 18:30
    - cron: "30 0 * * *"
    - cron: "30 6 * * *"
    - cron: "30 12 * * *"
    - cron: "30 18 * * *"

  workflow_dispatch:

jobs:
  scrape-eprolo:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install playwright gspread oauth2client requests

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libglib2.0-0 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run Eprolo Scraper
        env:
          EPROLO_EMAIL:      ${{ secrets.EPROLO_EMAIL }}
          EPROLO_PASSWORD:   ${{ secrets.EPROLO_PASSWORD }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          echo "🛍️ Eprolo Scraper Starting..."
          python eprolo_scraper.py
          echo "✅ Done!"

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eprolo-logs
          path: "*.log"
          retention-days: 3
