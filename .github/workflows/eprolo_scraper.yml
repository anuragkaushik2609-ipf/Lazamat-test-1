name: Eprolo Scraper

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencies install karo
        run: |
          pip install playwright gspread oauth2client
          playwright install chromium
          playwright install-deps chromium

      - name: Eprolo Scraper Run
        env:
          EPROLO_EMAIL:       ${{ secrets.EPROLO_EMAIL }}
          EPROLO_PASSWORD:    ${{ secrets.EPROLO_PASSWORD }}
          GOOGLE_SHEET_ID:    ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python eprolo_scraper.py
